<script>
// ============================================================
// CONFIGURATION
// ============================================================
const COL_LAT   = "latitude";
const COL_LON   = "longitude";
const COL_TITRE = "Numero";
const COL_ADRESSE = "adresse_normalisee";
const COL_COMMUNE = "Commune";

const CENTRE_DEFAUT = [43.38, -1.55];
const ZOOM_DEFAUT = 11;

// ============================================================

let map;
let coucheCadastre;
let cadastreActif = false;

let marqueurs = {};
let marqueurSelectionne = null;

let groupeMarqueurs;
let premiereCharge = true;

// ============================================================

function initCarte() {

  map = L.map("map", {
    maxZoom: 24,
    zoomSnap: 0.25
  }).setView(CENTRE_DEFAUT, ZOOM_DEFAUT);

  L.tileLayer(
    "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      maxZoom: 24,
      maxNativeZoom: 19,
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }
  ).addTo(map);

  coucheCadastre = L.tileLayer(
    "https://data.geopf.fr/wmts?layer=CADASTRALPARCELS.PARCELLAIRE_EXPRESS&style=PCI%20vecteur&tilematrixset=PM_0_19&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/png&TileMatrix={z}&TileCol={x}&TileRow={y}",
    {
      maxZoom: 24,
      maxNativeZoom: 20,
      attribution:
        "Direction Générale des Finances Publiques (Cadastre)",
      opacity: 0.7
    }
  );

  groupeMarqueurs = L.layerGroup().addTo(map);

  const ControleCadastre = L.Control.extend({
    options: { position: "topright" },

    onAdd: function () {
      const div = L.DomUtil.create(
        "div",
        "controle-cadastre"
      );

      div.innerHTML = `
        <label>
          <input type="checkbox" id="toggle-cadastre">
          Afficher le cadastre
        </label>
      `;

      L.DomEvent.disableClickPropagation(div);

      return div;
    }
  });

  map.addControl(new ControleCadastre());

  document
    .getElementById("toggle-cadastre")
    .addEventListener("change", (e) => {

      cadastreActif = e.target.checked;

      if (cadastreActif) {
        coucheCadastre.addTo(map);
      } else {
        map.removeLayer(coucheCadastre);
      }
    });
}

// ============================================================

function construirePopup(record) {

  const titre =
    record[COL_TITRE] || "Dossier";

  const adresse =
    record[COL_ADRESSE] ||
    record["Terrain"] ||
    "";

  const commune =
    record[COL_COMMUNE] || "";

  return `
    <b>${titre}</b><br>
    ${adresse}<br>
    <span style="color:#666">${commune}</span>
  `;
}

// ============================================================

function majMarqueurs(records) {

  groupeMarqueurs.clearLayers();

  marqueurs = {};

  const bounds = [];

  records.forEach((record) => {

    const lat = parseFloat(
      record[COL_LAT]
    );

    const lon = parseFloat(
      record[COL_LON]
    );

    if (
      !lat ||
      !lon ||
      isNaN(lat) ||
      isNaN(lon)
    ) {
      return;
    }

    const marker = L.marker([
      lat,
      lon
    ]);

    marker.bindPopup(
      construirePopup(record)
    );

    marker.on(
      "click",
      async () => {

        try {

          await grist.setCursorPos({
            rowId: record.id
          });

          await grist.setSelectedRows([
            record.id
          ]);

        } catch (e) {
          console.error(e);
        }

        map.flyTo(
          [lat, lon],
          Math.max(
            map.getZoom(),
            18
          ),
          {
            duration: 0.5
          }
        );

        marker.openPopup();
      }
    );

    marker.addTo(
      groupeMarqueurs
    );

    marqueurs[
      record.id
    ] = marker;

    bounds.push([
      lat,
      lon
    ]);
  });

  if (
    premiereCharge &&
    bounds.length > 0
  ) {

    map.fitBounds(
      bounds,
      {
        padding: [30, 30],
        maxZoom: 16
      }
    );

    premiereCharge = false;
  }
}

// ============================================================
// API GRIST
// ============================================================

grist.ready({
  requiredAccess: "read table",

  columns: [
    {
      name: COL_LAT,
      title: "Latitude",
      type: "Numeric"
    },
    {
      name: COL_LON,
      title: "Longitude",
      type: "Numeric"
    },
    {
      name: COL_TITRE,
      title: "Titre",
      type: "Any",
      optional: true
    },
    {
      name: COL_ADRESSE,
      title: "Adresse",
      type: "Any",
      optional: true
    },
    {
      name: COL_COMMUNE,
      title: "Commune",
      type: "Any",
      optional: true
    }
  ]
});

// ============================================================
// Chargement des données
// ============================================================

grist.onRecords(
  (records) => {

    if (!map) {
      initCarte();
    }

    majMarqueurs(records);
  }
);

// ============================================================
// Tableau → Carte
// ============================================================

grist.onRecord(
  (record) => {

    if (!record) return;

    const marker =
      marqueurs[
        record.id
      ];

    if (!marker) return;

    if (
      marqueurSelectionne
    ) {
      marqueurSelectionne.setOpacity(
        1
      );
    }

    marker.setOpacity(
      0.5
    );

    marqueurSelectionne =
      marker;

    map.flyTo(
      marker.getLatLng(),
      Math.max(
        map.getZoom(),
        18
      ),
      {
        duration: 0.7
      }
    );

    marker.openPopup();
  }
);

// ============================================================

grist.onOptions(
  () => {}
);

window.addEventListener(
  "load",
  () => {

    if (!map) {
      initCarte();
    }
  }
);
</script>
