<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte DIA — Cadastre</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
  #map { height: 100%; width: 100%; }
  .leaflet-popup-content { font-size: 13px; line-height: 1.6; min-width: 180px; }
  .leaflet-popup-content b { color: #1a5fb4; font-size: 14px; }
  .popup-commune { color: #666; font-size: 12px; }
  .controle-cadastre {
    background: white;
    padding: 6px 10px;
    border-radius: 4px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    font-size: 13px;
  }
  .controle-cadastre label {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 0;
  }
</style>
</head>
<body>
<div id="map"></div>

<script>
// ============================================================
// NOMS DES COLONNES — adapte si besoin
// ============================================================
const COL_LAT     = "latitude";
const COL_LON     = "longitude";
const COL_TITRE   = "Numero";
const COL_ADRESSE = "adresse_normalisee";
const COL_COMMUNE = "Commune";
const COL_TERRAIN = "Terrain";
const COL_PRIX    = "Prix";

const CENTRE_DEFAUT = [43.38, -1.55];
const ZOOM_DEFAUT   = 11;
// ============================================================

let map, groupeMarqueurs, coucheCadastre;
let marqueurs = {};          // rowId → marker Leaflet
let rowIdSelectionne = null;
let derniersRecords = [];    // mémorise les records reçus

// --- Style des marqueurs : petits cercles discrets, fins, semi-transparents ---
const STYLE_NORMAL = {
  radius: 6,
  color: "#1a5fb4",       // contour bleu fin
  weight: 1.5,
  fillColor: "#4d8fdc",
  fillOpacity: 0.55,
  opacity: 0.75
};

const STYLE_SELECTIONNE = {
  radius: 7,
  color: "#a00",          // contour rouge
  weight: 1.5,
  fillColor: "#e53e3e",
  fillOpacity: 0.7,
  opacity: 0.9
};

function initCarte() {
  map = L.map("map").setView(CENTRE_DEFAUT, ZOOM_DEFAUT);

  // Fond de carte épuré — Carto Positron (CartoDB), basé sur les données OpenStreetMap
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    maxZoom: 22,
    subdomains: "abcd",
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);

  coucheCadastre = L.tileLayer(
    "https://data.geopf.fr/wmts?layer=CADASTRALPARCELS.PARCELLAIRE_EXPRESS&style=PCI%20vecteur&tilematrixset=PM_0_19&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/png&TileMatrix={z}&TileCol={x}&TileRow={y}",
    { minZoom: 0, maxZoom: 22, maxNativeZoom: 19, attribution: "Cadastre © DGFiP", opacity: 0.75 }
  );

  groupeMarqueurs = L.layerGroup().addTo(map);

  const ControleCadastre = L.Control.extend({
    options: { position: "topright" },
    onAdd() {
      const div = L.DomUtil.create("div", "controle-cadastre");
      div.innerHTML = `<label><input type="checkbox" id="toggle-cadastre"> Cadastre</label>`;
      L.DomEvent.disableClickPropagation(div);
      return div;
    }
  });
  map.addControl(new ControleCadastre());

  document.getElementById("toggle-cadastre").addEventListener("change", e => {
    if (e.target.checked) coucheCadastre.addTo(map);
    else map.removeLayer(coucheCadastre);
  });
}

function construirePopup(r) {
  const titre   = r[COL_TITRE]   || "Dossier";
  const adresse = r[COL_ADRESSE] || r[COL_TERRAIN] || "";
  const commune = r[COL_COMMUNE] || "";
  const prixBrut = r[COL_PRIX];

  let ligneprix = "";
  if (prixBrut !== null && prixBrut !== undefined && prixBrut !== "") {
    const prixNombre = parseFloat(String(prixBrut).replace(/\s/g, "").replace(",", "."));
    const prixAffiche = !isNaN(prixNombre)
      ? prixNombre.toLocaleString("fr-FR") + " €"
      : prixBrut;
    ligneprix = `<br><b>${prixAffiche}</b>`;
  }

  return `<b>${titre}</b><br>${adresse}<br><span class="popup-commune">${commune}</span>${ligneprix}`;
}

function appliquerSelectionVisuelle(rowId) {
  // Remet TOUS les marqueurs au style normal d'abord (sécurité, évite les doublons en rouge)
  Object.values(marqueurs).forEach(m => m.setStyle(STYLE_NORMAL));
  rowIdSelectionne = rowId;
  if (rowId && marqueurs[rowId]) {
    marqueurs[rowId].setStyle(STYLE_SELECTIONNE);
    marqueurs[rowId].bringToFront();
  }
}

function majMarqueurs(records) {
  derniersRecords = records;
  groupeMarqueurs.clearLayers();
  marqueurs = {};
  const bounds = [];

  records.forEach(r => {
    const lat = parseFloat(r[COL_LAT]);
    const lon = parseFloat(r[COL_LON]);
    if (!lat || !lon || isNaN(lat) || isNaN(lon)) return;

    const estSelectionne = (r.id === rowIdSelectionne);
    const marker = L.circleMarker([lat, lon], estSelectionne ? STYLE_SELECTIONNE : STYLE_NORMAL);
    marker.bindPopup(construirePopup(r));

    marker.on("click", () => {
      appliquerSelectionVisuelle(r.id);
      marker.openPopup();
      // Envoie la sélection à Grist (sens carte → tableau)
      grist.setCursorPos({ rowId: r.id });
    });

    marker.addTo(groupeMarqueurs);
    marqueurs[r.id] = marker;
    bounds.push([lat, lon]);
  });

  if (bounds.length > 0 && rowIdSelectionne === null) {
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 16 });
  }
}

// ============================================================
// API Grist
// ============================================================
grist.ready({ requiredAccess: "read table", allowSelectBy: true });

// Reçoit TOUTES les lignes visibles (s'actualise à chaque changement de données)
grist.onRecords(records => {
  if (!map) initCarte();
  majMarqueurs(records);
});

// Reçoit la ligne actuellement sélectionnée/curseur dans le tableau (sens tableau → carte)
grist.onRecord(record => {
  if (!map) initCarte();
  if (!record) return;
  appliquerSelectionVisuelle(record.id);
  if (marqueurs[record.id]) {
    const latlng = marqueurs[record.id].getLatLng();
    map.setView(latlng, Math.max(map.getZoom(), 15));
    marqueurs[record.id].openPopup();
  }
});

window.addEventListener("load", () => { if (!map) initCarte(); });
</script>
</body>
</html>
